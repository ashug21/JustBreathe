version: "3.8"

services:
  backend:
    build: ./server
    container_name: backend_container
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    networks:
      - my-custom-network

  frontend:
    build: .
    container_name: frontend_container
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - my-custom-network

networks:
  my-custom-network:
    driver: bridge